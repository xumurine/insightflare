          $ref: "#/components/responses/NotFound"
  /api/v1/sites/{siteId}/realtime/sessions:
    parameters:
      - *a1
    get:
      operationId: getRealtimeSessions
      summary: Get realtime sessions
      description: Returns recent realtime sessions.
      tags:
        - Realtime
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 1000
          description: Maximum sessions.
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RealtimeSessionListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/sites/{siteId}/realtime/snapshot:
    parameters:
      - *a1
    get:
      operationId: getRealtimeSnapshot
      summary: Get realtime snapshot
      description: Returns active visitors, recent events, and recent sessions.
      tags:
        - Realtime
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RealtimeSnapshotResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/batch:
    post:
      operationId: batch
      summary: Execute global batch
      description: Executes up to 20 GET subrequests under /api/v1.
      tags:
        - Batch
      parameters:
        - name: Idempotency-Key
          in: header
          schema:
            type: string
            maxLength: 200
          description: Client-generated idempotency key.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchRequest"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
components:
  schemas:
    Meta:
      type: object
      description: Response metadata.
      required:
        - generatedAt
      properties:
        requestId:
          type: string
          description: Request correlation identifier.
        generatedAt:
          type: string
          format: date-time
          description: Response generation time in UTC.
        timeRange:
          $ref: "#/components/schemas/TimeRange"
        interval:
          type: string
          enum:
            - minute
            - hour
            - day
            - week
            - month
        partialFailure:
          type: boolean
      additionalProperties: true
    LinkMap:
      type: object
      description: Machine-readable links for resource discovery.
      additionalProperties:
        type: string
    SuccessEnvelope:
      type: object
      description: Standard successful response envelope.
      required:
        - data
        - meta
      properties:
        data: {}
        links:
          $ref: "#/components/schemas/LinkMap"
        meta:
          $ref: "#/components/schemas/Meta"
      additionalProperties: false
    ListEnvelope:
      type: object
      description: Standard list response envelope.
      required:
        - data
        - meta
      properties:
        data:
          type: array
          items: {}
        links:
          $ref: "#/components/schemas/LinkMap"
        meta:
          $ref: "#/components/schemas/Meta"
      additionalProperties: false
    Pagination:
      type: object
      description: Cursor pagination state.
      required:
        - limit
        - nextCursor
        - hasMore
      properties:
        limit:
          type: integer
          minimum: 1
          maximum: 1000
        nextCursor:
          type:
            - string
            - "null"
          maxLength: 512
        hasMore:
          type: boolean
    PaginatedEnvelope:
      type: object
      description: Standard cursor-paginated list response envelope.
      required:
        - data
        - pagination
        - meta
      properties:
        data:
          type: array
          items: {}
        pagination:
          $ref: "#/components/schemas/Pagination"
        links:
          $ref: "#/components/schemas/LinkMap"
        meta:
          $ref: "#/components/schemas/Meta"
      additionalProperties: false
    ErrorResponse:
      type: object
      description: Standard error response envelope.
      required:
        - error
        - meta
      properties:
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
              enum:
                - invalid_request
                - invalid_json
                - validation_failed
                - invalid_api_key
                - api_key_expired
                - api_key_revoked
                - insufficient_scope
                - site_not_found
                - resource_not_found
                - conflict
                - payload_too_large
                - internal_error
            message:
              type: string
            details:
              type: object
              additionalProperties: true
            help:
              type: object
              properties:
                token:
                  type: string
                documentation:
                  type: string
        meta:
          $ref: "#/components/schemas/Meta"
    Preset:
      type: string
      description: Named time range preset.
      enum:
        - today
        - yesterday
        - last_7_days
        - last_30_days
        - this_week
        - last_week
        - this_month
        - last_month
    TimeRange:
      type: object
      description: Resolved inclusive/exclusive time range.
      required:
        - from
        - to
        - timeZone
      properties:
        from:
          type: string
          format: date-time
          description: Inclusive start time.
        to:
          type: string
          format: date-time
          description: Exclusive end time.
        timeZone:
          type: string
          maxLength: 80
    TimeRangeInput:
      type: object
      description:
        Optional time range input. If from, to, and preset are omitted,
        analytics endpoints default to the last 7 days ending at request time.
        The default timeZone is UTC.
      properties:
        from:
          type: string
          format: date-time
          description: Inclusive ISO 8601 start time.
        to:
          type: string
          format: date-time
          description: Exclusive ISO 8601 end time.
        preset:
          $ref: "#/components/schemas/Preset"
        timeZone:
          type: string
          maxLength: 80
          default: UTC
          description: IANA time zone used to resolve presets.
    FilterObject:
      type: object
      description: Simple equality filters keyed by stable dimension name.
      additionalProperties:
        type: string
        maxLength: 500
    ComplexFilter:
      type: object
      description: Advanced filter rule for explore and search endpoints.
      required:
        - field
        - op
      properties:
        field:
          type: string
          maxLength: 120
          description: Stable filter field path.
        op:
          type: string
          enum:
            - eq
            - neq
            - in
            - notIn
            - contains
            - startsWith
            - endsWith
            - gt
            - gte
            - lt
            - lte
            - exists
            - notExists
        value: {}
    MetricDefinition:
      type: object
      description: Metric available for analytics queries.
      required:
        - key
        - label
        - type
        - description
      properties:
        key:
          type: string
        label:
          type: string
        type:
          type: string
          enum:
            - integer
            - rate
            - duration_ms
        description:
          type: string
    DimensionDefinition:
      type: object
      description: Dimension available for analytics breakdowns and filters.
      required:
        - key
        - label
        - type
      properties:
        key:
          type: string
        label:
          type: string
        type:
          type: string
        description:
          type: string
    SiteAccess:
      type: object
      description: Sites this token may access.
      required:
        - mode
        - siteIds
      properties:
        mode:
          type: string
          enum:
            - all
            - restricted
        siteIds:
          type: array
          items: &a5
            type: string
            format: uuid
    Token:
      type: object
      required:
        - id
        - name
        - status
        - team
        - scopes
        - siteAccess
      properties:
        id: *a5
        name:
          type: string
          maxLength: 120
        status:
          type: string
          enum:
            - active
            - expired
            - revoked
        createdAt: &a6
          type: string
          format: date-time
        expiresAt:
          type:
            - string
            - "null"
          format: date-time
        lastUsedAt:
          type:
            - string
            - "null"
          format: date-time
        team:
          type: object
          required:
            - id
            - name
          properties:
            id: *a5
            name:
              type: string
              maxLength: 120
        scopes:
          type: array
          items:
            type: string
            enum:
              - site:read
              - site:write
              - site_config:read
              - site_config:write
              - analytics:read
        siteAccess:
          $ref: "#/components/schemas/SiteAccess"
    TokenResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          description: Successful response
          properties:
            data:
              $ref: "#/components/schemas/Token"
    TokenCheckRequest:
      type: object
      required:
        - checks
      properties:
        checks:
          type: array
          maxItems: 50
          items:
            type: object
            required:
              - scope
            properties:
              scope:
                type: string
                maxLength: 80
              siteId: *a5
    TokenCheckResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          description: Successful response
          properties:
            data:
              type: object
              properties:
                checks:
                  type: array
                  items:
                    type: object
                    properties:
                      scope:
                        type: string
                      siteId: *a5
                      allowed:
                        type: boolean
                      reason:
                        type: string
                        enum:
                          - missing_scope
                          - site_not_allowed
                          - token_inactive
    CapabilitiesFeatures:
      type: object
      description: Feature availability flags for the current token.
      required:
        - sites
        - tracking
        - privacy
        - sharing
        - analytics
        - events
        - visitors
        - sessions
        - funnels
        - performance
        - realtime
        - exports
        - batch
      properties:
        sites:
          type: boolean
        tracking:
          type: boolean
        privacy:
          type: boolean
        sharing:
          type: boolean
        analytics:
          type: boolean
        events:
          type: boolean
        visitors:
          type: boolean
        sessions:
          type: boolean
        funnels:
          type: boolean
        performance:
          type: boolean
        realtime:
          type: boolean
        exports:
          type: boolean
        batch:
          type: boolean
      additionalProperties: false
    CapabilitiesLimits:
      type: object
      description: Runtime limits exposed to clients.
      required:
        - batchMaxRequests
        - defaultTimeRangeDays
        - maxTimeRangeDays
        - defaultPageLimit
        - maxPageLimit
      properties:
        batchMaxRequests:
          type: integer
          minimum: 1
        defaultTimeRangeDays:
          type: integer
          minimum: 1
        maxTimeRangeDays:
          type: integer
          minimum: 1
        defaultPageLimit:
          type: integer
          minimum: 1
        maxPageLimit:
          type: integer
          minimum: 1
      additionalProperties: false
    Capabilities:
      type: object
      description: Runtime capabilities available to the current token.
      required:
        - apiVersion
        - features
        - limits
        - links
      properties:
        apiVersion:
          type: string
        features:
          $ref: "#/components/schemas/CapabilitiesFeatures"
        limits:
          $ref: "#/components/schemas/CapabilitiesLimits"
        links:
          $ref: "#/components/schemas/LinkMap"
      additionalProperties: false
    CapabilitiesResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          description: Successful response
          properties:
            data:
              $ref: "#/components/schemas/Capabilities"
    RootDiscoveryResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          description: Successful response
          properties:
            data:
              type: object
              properties:
                version:
                  type: string
                service:
                  type: string
                links:
                  $ref: "#/components/schemas/LinkMap"
    Team:
      type: object
      properties:
        id: *a5
        name:
          type: string
          maxLength: 120
        createdAt: *a6
        links:
          $ref: "#/components/schemas/LinkMap"
    TeamResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          description: Successful response
          properties:
            data:
              $ref: "#/components/schemas/Team"
    Site:
      type: object
      required:
        - id
        - name
        - domain
        - createdAt
        - updatedAt
        - sharing
        - links
      properties:
        id: *a5
        name:
          type: string
          maxLength: 120
        domain:
          type: string
          maxLength: 255
        createdAt: *a6
        updatedAt: *a6
        sharing:
          $ref: "#/components/schemas/SharingSettings"
        links:
          $ref: "#/components/schemas/LinkMap"
    SiteCreateInput:
      type: object
      required:
        - name
        - domain
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        domain:
          type: string
          minLength: 1
          maxLength: 255
        sharing:
          $ref: "#/components/schemas/SharingSettings"
    SiteUpdateInput:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        domain:
          type: string
          minLength: 1
          maxLength: 255
        sharing:
          $ref: "#/components/schemas/SharingSettings"
    SiteResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          description: Successful response
          properties:
            data:
              $ref: "#/components/schemas/Site"
    SiteListResponse:
      allOf:
        - $ref: "#/components/schemas/ListEnvelope"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/Site"
    TrackingSettings:
      type: object
      description: Tracking settings for the client script.
      properties:
        trackPageviews:
          type: boolean
        trackQuery:
          type: boolean
        trackHash:
          type: boolean
        trackCustomEvents:
          type: boolean
        trackEngagement:
          type: boolean
        trackWebVitals:
          type: boolean
        autoTrackOutboundLinks:
          type: boolean
        trackingStrength:
          type: string
          enum:
            - strong
            - smart
            - weak
          description: Privacy-aware tracking mode.
        allowedDomains:
          type: array
          items:
            type: string
            maxLength: 255
        excludedPaths:
          type: array
          items:
            type: string
            maxLength: 2048
    TrackingSettingsResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          description: Successful response
          properties:
            data:
              $ref: "#/components/schemas/TrackingSettings"
    TrackingScriptResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          description: Successful response
          properties:
            data:
              type: object
              properties:
                siteId: *a5
                src:
                  type: string
                  format: uri
                snippet:
                  type: string
    PrivacySettings:
      type: object
      description: Privacy settings for visitor data handling.
      properties:
        respectDoNotTrack:
          type: boolean
        anonymizeIp:
          type: boolean
        euMode:
          type: boolean
        visitorTokenMode:
          type: string
          enum:
            - daily
        dataRetentionDays:
          type: integer
          minimum: 1
    PrivacySettingsResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          description: Successful response
          properties:
            data:
              $ref: "#/components/schemas/PrivacySettings"
    SharingSettings:
      type: object
      properties:
        publicEnabled:
          type: boolean
        publicSlug:
          type:
            - string
            - "null"
          maxLength: 120
    SharingSettingsResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          description: Successful response
          properties:
            data:
              $ref: "#/components/schemas/SharingSettings"
    AnalyticsSchemaResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          description: Successful response
          properties:
            data:
              type: object
              properties:
                metrics:
                  type: array
                  items:
                    $ref: "#/components/schemas/MetricDefinition"
                dimensions:
                  type: array
                  items:
                    $ref: "#/components/schemas/DimensionDefinition"
                filters:
                  type: array
                  items:
                    type: string
                operators:
                  type: array
                  items:
                    type: string
                intervals:
                  type: array
                  items:
                    type: string
                presets:
                  type: array
                  items:
                    $ref: "#/components/schemas/Preset"
                timeRange:
                  type: object
                  properties:
                    earliestAvailableAt:
                      type:
                        - string
                        - "null"
                      format: date-time
                    latestAvailableAt: *a6
                links:
                  $ref: "#/components/schemas/LinkMap"
    OverviewMetrics:
      type: object
      properties:
        views:
          type: integer
        sessions:
          type: integer
        visitors:
          type: integer
        bounces:
          type: integer
        bounceRate:
          type: number
          minimum: 0
          maximum: 1
        avgDurationMs:
          type: number
        viewsPerSession:
          type: number
        approximateVisitors:
          type: boolean
    AnalyticsOverviewResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          description: Successful response
          properties:
            data:
              $ref: "#/components/schemas/OverviewMetrics"
    TimeseriesPoint:
      type: object
      properties:
        start: *a6
        end: *a6
        views:
          type: integer
        sessions:
          type: integer
        visitors:
          type: integer
        events:
          type: integer
    AnalyticsTimeseriesResponse:
      allOf:
        - $ref: "#/components/schemas/ListEnvelope"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/TimeseriesPoint"
    BreakdownRow:
      type: object
      properties:
        key:
          type: string
        label:
          type: string
        views:
          type: integer
        sessions:
          type: integer
        visitors:
          type: integer
        events:
          type: integer
    AnalyticsBreakdownResponse:
      allOf:
        - $ref: "#/components/schemas/ListEnvelope"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/BreakdownRow"
    AnalyticsExploreRequest:
      type: object
      description: Advanced analytics query input.
      properties:
        timeRange:
          $ref: "#/components/schemas/TimeRangeInput"
        metrics:
          type: array
          items:
            type: string
        dimensions:
          type: array
          items:
            type: string
        filters:
          type: array
          items:
            $ref: "#/components/schemas/ComplexFilter"
        orderBy:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
                maxLength: 120
              direction:
                type: string
                enum:
                  - asc
                  - desc
        limit:
          type: integer
          minimum: 1
          maximum: 1000
    AnalyticsCompareResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          description: Successful response
          properties:
            data:
              type: object
              description: Period-over-period analytics comparison.
              properties:
                current:
                  $ref: "#/components/schemas/OverviewMetrics"
                previous:
                  $ref: "#/components/schemas/OverviewMetrics"
                change:
                  type: object
                  description: "Relative changes as 0-based rates. Example: 0.12 means +12%."
                  additionalProperties:
                    type: number
    AnalyticsExploreRow:
      type: object
      description: One row returned by an analytics explore query.
      additionalProperties: true
    AnalyticsExploreResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          description: Successful response
          properties:
            data:
              type: object
              description: Advanced analytics query result.
              properties:
                rows:
                  type: array
                  items:
                    $ref: "#/components/schemas/AnalyticsExploreRow"
                metrics:
                  type: array
                  items:
                    type: string
                dimensions:
                  type: array
                  items:
                    type: string
                filters:
                  type: array
                  items:
                    $ref: "#/components/schemas/ComplexFilter"
    RetentionCohortsResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          description: Successful response
          properties:
            data:
              type: object
              description: Visitor retention cohort response.
              properties:
                interval:
                  type: string
                  enum:
                    - minute
                    - hour
                    - day
                    - week
                    - month
                cohorts:
                  type: array
                  items:
                    type: object
                    properties:
                      start: *a6
                      size:
                        type: integer
                        minimum: 0
                      periods:
                        type: array
                        items:
                          type: object
                          properties:
                            index:
                              type: integer
                              minimum: 0
                            visitors:
                              type: integer
                              minimum: 0
                            rate:
                              type: number
                              minimum: 0
                              maximum: 1
    GenericObjectResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          description: Successful response
          properties:
            data:
              type: object
              additionalProperties: true
    EventsSummaryResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          description: Successful response
          properties:
            data:
              type: object
              description: Event summary response.
              properties:
                events:
                  type: integer
                  minimum: 0
                eventTypes:
                  type: integer
                  minimum: 0
                sessions:
                  type: integer
                  minimum: 0
                visitors:
                  type: integer
                  minimum: 0
                avgEventsPerSession:
                  type: number
                  minimum: 0
    EventRecord:
      type: object
      additionalProperties: true
      properties:
        id: *a5
        eventName:
          type: string
          maxLength: 120
        occurredAt: *a6
    EventListResponse:
      allOf:
        - $ref: "#/components/schemas/PaginatedEnvelope"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/EventRecord"
    EventResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          description: Successful response
          properties:
            data:
              $ref: "#/components/schemas/EventRecord"
    EventPayloadFilter:
      type: object
      description: Filter applied to custom event payload fields.
      required:
        - path
        - op
      properties:
        path:
          type: string
          maxLength: 240
          description: Dot-notation path inside the event payload.
        op:
          type: string
          enum:
            - eq
            - neq
            - in
            - notIn
            - contains
            - startsWith
            - endsWith
            - gt
            - gte
            - lt
            - lte
            - exists
            - notExists
        value:
          description: Comparison value. Required unless op is exists or notExists.
      additionalProperties: false
    EventSearchRequest:
      type: object
      description: Request for searching event records with complex filters.
      properties:
        timeRange:
          $ref: "#/components/schemas/TimeRangeInput"
        eventName:
          type: string
          maxLength: 120
          description: Optional event name filter.
        payloadFilters:
          type: array
          items:
            $ref: "#/components/schemas/EventPayloadFilter"
        filters:
          type: array
          items:
            $ref: "#/components/schemas/ComplexFilter"
        limit:
          type: integer
          minimum: 1
          maximum: 1000
          default: 100
        cursor:
          type: string
          maxLength: 512
      additionalProperties: false
    Visitor:
      type: object
      description: Visitor resource.
      additionalProperties: true
      properties:
        visitorId:
          type: string
          maxLength: 160
        firstSeenAt: *a6
        lastSeenAt: *a6
        views:
          type: integer
          minimum: 0
        sessions:
          type: integer
          minimum: 0
        events:
          type: integer
          minimum: 0
        links:
          $ref: "#/components/schemas/LinkMap"
    VisitorListResponse:
      allOf:
        - $ref: "#/components/schemas/PaginatedEnvelope"
