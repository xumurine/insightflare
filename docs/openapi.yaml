            type: string
          description: Filter by session exit path
        - name: sourceDomain
          in: query
          schema:
            type: string
          description: Filter by referrer domain
        - name: sourceLink
          in: query
          schema:
            type: string
          description: Filter by referrer URL
        - name: clientBrowser
          in: query
          schema:
            type: string
          description: Filter by client-reported browser
        - name: clientOsVersion
          in: query
