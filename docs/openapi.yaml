components:
  schemas:
    Meta:
      type: object
      description: Response metadata.
      required:
        - generatedAt
      properties:
        requestId:
          type: string
          description: Request correlation identifier.
        generatedAt:
          type: string
          format: date-time
          description: Response generation time in UTC.
        timeRange:
          $ref: "#/components/schemas/TimeRange"
        interval:
          type: string
          enum:
            - minute
            - hour
            - day
            - week
            - month
        partialFailure:
          type: boolean
      additionalProperties: true
    LinkMap:
      type: object
      description: Machine-readable links for resource discovery.
      additionalProperties:
        type: string
    SuccessEnvelope:
      type: object
      description: Standard successful response envelope.
      required:
        - data
        - meta
      properties:
        data: {}
        links:
          $ref: "#/components/schemas/LinkMap"
        meta:
          $ref: "#/components/schemas/Meta"
      additionalProperties: false
    ListEnvelope:
      type: object
      description: Standard list response envelope.
      required:
        - data
        - meta
      properties:
        data:
          type: array
          items: {}
        links:
          $ref: "#/components/schemas/LinkMap"
        meta:
          $ref: "#/components/schemas/Meta"
      additionalProperties: false
    Pagination:
      type: object
      description: Cursor pagination state.
      required:
        - limit
        - nextCursor
        - hasMore
      properties:
        limit:
          type: integer
          minimum: 1
          maximum: 1000
        nextCursor:
          type:
            - string
            - "null"
          maxLength: 512
        hasMore:
          type: boolean
    PaginatedEnvelope:
      type: object
      description: Standard cursor-paginated list response envelope.
      required:
        - data
        - pagination
        - meta
      properties:
        data:
          type: array
          items: {}
        pagination:
          $ref: "#/components/schemas/Pagination"
        links:
          $ref: "#/components/schemas/LinkMap"
        meta:
          $ref: "#/components/schemas/Meta"
      additionalProperties: false
    ErrorResponse:
      type: object
      description: Standard error response envelope.
      example:
        error:
          code: validation_failed
          message: Invalid request body.
          details:
            field: steps
          help:
            token: /api/v1/token
            documentation: /.well-known/openapi.json
        meta:
          requestId: req_abc123
          generatedAt: 2026-06-26T12:00:00Z
      required:
        - error
        - meta
      properties:
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
              enum:
                - invalid_request
                - invalid_json
                - validation_failed
                - invalid_api_key
                - api_key_expired
                - api_key_revoked
                - insufficient_scope
                - site_not_found
                - resource_not_found
                - conflict
                - payload_too_large
                - internal_error
            message:
              type: string
            details:
              type: object
              additionalProperties: true
            help:
              type: object
              properties:
                token:
                  type: string
                documentation:
                  type: string
        meta:
          $ref: "#/components/schemas/Meta"
    Preset:
      type: string
      description:
        "Named time range preset. today: current calendar day in timeZone.
        yesterday: previous calendar day. last_7_days and last_30_days end at
        request time. this_week/last_week and this_month/last_month use calendar
        boundaries in timeZone."
      enum:
        - today
        - yesterday
        - last_7_days
        - last_30_days
        - this_week
        - last_week
        - this_month
        - last_month
    TimeRange:
      type: object
      description: Resolved inclusive/exclusive time range.
      required:
        - from
        - to
        - timeZone
      properties:
        from:
          type: string
          format: date-time
          description: Inclusive start time.
        to:
          type: string
          format: date-time
          description: Exclusive end time.
        timeZone:
          type: string
          maxLength: 80
    TimeRangeInput:
      type: object
      description:
        Optional time range input. If from, to, and preset are omitted,
        analytics endpoints default to the last 7 days ending at request time.
        The default timeZone is UTC.
      properties:
        from:
          type: string
          format: date-time
          description: Inclusive ISO 8601 start time.
        to:
          type: string
          format: date-time
          description: Exclusive ISO 8601 end time.
        preset:
          $ref: "#/components/schemas/Preset"
        timeZone:
          type: string
          maxLength: 80
          default: UTC
          description: IANA time zone used to resolve presets.
    FilterObject:
      type: object
      description: Simple equality filters keyed by stable dimension name.
      additionalProperties:
        type: string
        maxLength: 500
    ComplexFilter:
      type: object
      description:
        Advanced filter rule for explore and search endpoints. For eq, neq,
        contains, startsWith, and endsWith, use a scalar value. For in and
        notIn, use an array value. For gt, gte, lt, and lte, use a number or ISO
        8601 date-time string depending on the field. For exists and notExists,
        value may be omitted.
      required:
        - field
        - op
      properties:
        field:
          type: string
          maxLength: 120
          description: Stable filter field path.
        op:
          type: string
          description:
            Filter operator. exists and notExists ignore value; in and notIn
            expect an array-compatible value.
          enum:
            - eq
            - neq
            - in
            - notIn
            - contains
            - startsWith
            - endsWith
            - gt
            - gte
            - lt
            - lte
            - exists
            - notExists
        value:
          oneOf:
            - type: string
            - type: number
            - type: boolean
            - type: array
              items:
                oneOf:
                  - type: string
                  - type: number
                  - type: boolean
    MetricDefinition:
      type: object
      description: Metric available for analytics queries.
      required:
        - id
        - key
        - label
        - type
        - description
      properties:
        id:
          type: string
        key:
          type: string
        label:
          type: string
        description:
          type: string
        unit:
          type: string
          enum:
            - count
            - ratio
            - milliseconds
        type:
          type: string
          enum:
            - integer
            - number
            - rate
        aggregation:
          type: string
          enum:
            - sum
            - average
            - ratio
            - derived
        filterable:
          type: boolean
        sortable:
          type: boolean
    DimensionDefinition:
      type: object
      description: Dimension available for analytics breakdowns and filters.
      required:
        - id
        - key
        - label
        - type
      properties:
        id:
          type: string
        key:
          type: string
        label:
          type: string
        description:
          type: string
        type:
          type: string
        filterable:
          type: boolean
        groupable:
          type: boolean
        sortable:
          type: boolean
    SiteAccess:
      type: object
      description: Sites this token may access.
      required:
        - mode
        - siteIds
      properties:
        mode:
          type: string
          enum:
            - all
            - restricted
          description:
            all means the token can access all current and future team sites;
            restricted means only listed siteIds.
        siteIds:
          type: array
          items: &a15
            type: string
            format: uuid
    Token:
      type: object
      description: Non-secret metadata for the current API token.
      required:
        - id
        - name
        - status
        - team
        - scopes
        - siteAccess
      properties:
        id: *a15
        name:
          type: string
          maxLength: 120
        status:
          type: string
          enum:
            - active
            - expired
            - revoked
          description: active can be used; expired passed expiresAt; revoked was disabled.
        createdAt: &a16
          type: string
          format: date-time
        expiresAt:
          type:
            - string
            - "null"
          format: date-time
        lastUsedAt:
          type:
            - string
            - "null"
          format: date-time
        team:
          type: object
          required:
            - id
            - name
          properties:
            id: *a15
            name:
              type: string
              maxLength: 120
        scopes:
          type: array
          items:
            type: string
            enum:
              - site:read
              - site:write
              - site_config:read
              - site_config:write
              - analytics:read
        siteAccess:
          $ref: "#/components/schemas/SiteAccess"
    TokenResponse:
      description: Response envelope.
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          description: Response envelope.
          properties:
            data:
              $ref: "#/components/schemas/Token"
    TokenCheckRequest:
      type: object
      description: Bulk permission check request for scopes and optional site access.
      required:
        - checks
      properties:
        checks:
          type: array
          maxItems: 50
          items:
            type: object
            required:
              - scope
            properties:
              scope:
                type: string
                maxLength: 80
              siteId: *a15
    TokenCheckResponse:
      description: Response envelope.
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          description: Response envelope.
          properties:
            data:
              type: object
              properties:
                checks:
                  type: array
                  items:
                    type: object
                    properties:
                      scope:
                        type: string
                      siteId: *a15
                      allowed:
                        type: boolean
                      reason:
                        type: string
                        enum:
                          - missing_scope
                          - site_not_allowed
                          - token_inactive
    CapabilitiesFeatures:
      type: object
      description: Feature availability flags for the current token.
      required:
        - sites
        - tracking
        - privacy
        - sharing
        - analytics
        - events
        - visitors
        - sessions
        - funnels
        - performance
        - realtime
        - exports
        - batch
      properties:
        sites:
          type: boolean
        tracking:
          type: boolean
        privacy:
          type: boolean
        sharing:
          type: boolean
        analytics:
          type: boolean
        events:
          type: boolean
        visitors:
          type: boolean
        sessions:
          type: boolean
        funnels:
          type: boolean
        performance:
          type: boolean
        realtime:
          type: boolean
        exports:
          type: boolean
        batch:
          type: boolean
      additionalProperties: false
    CapabilitiesLimits:
      type: object
      description: Runtime limits exposed to clients.
      required:
        - batchMaxRequests
        - defaultTimeRangeDays
        - maxTimeRangeDays
        - defaultPageLimit
        - maxPageLimit
      properties:
        batchMaxRequests:
          type: integer
          minimum: 1
        defaultTimeRangeDays:
          type: integer
          minimum: 1
        maxTimeRangeDays:
          type: integer
          minimum: 1
        defaultPageLimit:
          type: integer
          minimum: 1
        maxPageLimit:
          type: integer
          minimum: 1
      additionalProperties: false
    Capabilities:
      type: object
      description: Runtime capabilities available to the current token.
      required:
        - apiVersion
        - features
        - limits
        - links
      properties:
        apiVersion:
          type: string
        features:
          $ref: "#/components/schemas/CapabilitiesFeatures"
        limits:
          $ref: "#/components/schemas/CapabilitiesLimits"
        links:
          $ref: "#/components/schemas/LinkMap"
      additionalProperties: false
    CapabilitiesResponse:
      description: Response envelope.
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          description: Response envelope.
          properties:
