      in: path
      required: true
      schema:
        type: string
        maxLength: 120
      description: Event name.
    eventId:
      name: eventId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Event UUID.
    visitorId:
      name: visitorId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Visitor UUID.
    sessionId:
      name: sessionId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Session UUID.
    funnelId:
      name: funnelId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Funnel UUID.
  responses:
    BadRequest:
      description: Bad request
      content: &a7
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Authentication failed
