      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, steps]
              properties:
                name:
                  type: string
                  maxLength: 200
                steps:
                  type: array
                  minItems: 2
                  maxItems: 10
                  items:
                    $ref: "#/components/schemas/FunnelStep"
            example:
              name: "Signup Flow"
              steps:
                - type: pageview
                  value: "/pricing"
                - type: pageview
                  value: "/signup"
                - type: event
                  value: "signup_complete"
