        referrerHost:
          type: string
        referrerUrl:
          type: string
        country:
          type: string
        region:
          type: string
        regionCode:
          type: string
        city:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        browser:
          type: string
        browserVersion:
          type: string
        os:
          type: string
        osVersion:
          type: string
        deviceType:
          type: string
        screenWidth:
          type: integer
        screenHeight:
          type: integer
