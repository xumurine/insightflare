        - type: object
          description: Response envelope for list results.
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/Funnel"
    FunnelAnalysisStep:
      type: object
      description: Funnel analysis metrics for one step.
      properties:
        index:
          type: integer
          minimum: 0
        label:
          type: string
        type:
          type: string
          enum:
            - pageview
            - event
        sessions:
          type: integer
          minimum: 0
        visitors:
          type: integer
          minimum: 0
        conversionRate:
          type: number
        stepConversionRate:
          type: number
        dropOffSessions:
          type: integer
          minimum: 0
        dropOffRate:
          type: number
    FunnelAnalysisSummary:
      type: object
      properties:
        totalSessions:
          type: integer
          minimum: 0
        convertedSessions:
          type: integer
          minimum: 0
        totalVisitors:
          type: integer
          minimum: 0
        convertedVisitors:
          type: integer
          minimum: 0
        overallConversionRate:
          type: number
        largestDropOffStepIndex:
          type:
            - integer
            - "null"
    FunnelAnalysis:
      type: object
      description: Funnel analysis result.
      properties:
        steps:
          type: array
          items:
            $ref: "#/components/schemas/FunnelAnalysisStep"
        summary:
          $ref: "#/components/schemas/FunnelAnalysisSummary"
    FunnelAnalysisResponse:
      description: Response envelope.
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          description: Response envelope.
          properties:
            data:
              $ref: "#/components/schemas/FunnelAnalysis"
    SavedFunnelAnalysisResponse:
      description: Response envelope.
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          description: Response envelope.
          properties:
            data:
              type: object
              description: Saved funnel with current analysis result.
              properties:
                funnel:
                  $ref: "#/components/schemas/Funnel"
                analysis:
                  $ref: "#/components/schemas/FunnelAnalysis"
    RealtimeEventListResponse:
      description: Response envelope for list results.
      allOf:
        - $ref: "#/components/schemas/ListEnvelope"
        - type: object
          description: Response envelope for list results.
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/EventRecord"
    RealtimeSessionListResponse:
      description: Response envelope for list results.
      allOf:
        - $ref: "#/components/schemas/ListEnvelope"
        - type: object
          description: Response envelope for list results.
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/Session"
    ActiveVisitorsResponse:
      description: Response envelope.
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          description: Response envelope.
          properties:
            data:
              type: object
              required:
                - activeVisitors
              properties:
                activeVisitors:
                  type: integer
                  minimum: 0
    RealtimeSnapshotResponse:
      description: Response envelope.
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          description: Response envelope.
          properties:
            data:
              type: object
              properties:
                activeVisitors:
                  type: integer
                events:
                  type: array
                  items:
                    $ref: "#/components/schemas/EventRecord"
                sessions:
                  type: array
                  items:
                    $ref: "#/components/schemas/Session"
    BatchRequest:
      type: object
      required:
        - requests
      properties:
        requests:
          type: array
          minItems: 1
          maxItems: 20
          items:
            type: object
            required:
              - id
              - method
              - path
            properties:
              id:
                type: string
                maxLength: 80
              method:
                type: string
                enum:
                  - GET
              path:
                type: string
                maxLength: 2048
              query:
                type: object
                additionalProperties:
                  type: string
                  maxLength: 500
    BatchResponse:
      description: Response envelope.
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          description: Response envelope.
          properties:
            data:
              type: object
              properties:
                responses:
                  type: array
                  items:
                    type: object
                    properties:
                      id:
                        type: string
                      status:
                        type: integer
                      body: {}
    HealthResponse:
      type: object
      description: Service health response.
      properties:
        status:
          type: string
          enum:
            - healthy
        timestamp: *a16
    CollectPage:
      type: object
      description: Page context for a collect payload.
      properties:
        url:
          type: string
          maxLength: 2048
          description: Full page URL.
        path:
          type: string
          maxLength: 2048
          description: Page path.
        title:
          type: string
          maxLength: 300
          description: Page title.
        referrer:
          type:
            - string
            - "null"
          maxLength: 2048
          description: Full referrer URL, if available.
        hostname:
          type: string
          maxLength: 255
          description: Page hostname.
        query:
          type: string
          maxLength: 2048
          description: URL query string.
        hash:
          type: string
          maxLength: 512
          description: URL hash fragment.
    CollectClient:
      type: object
      description: Browser and device context reported by the client SDK.
      properties:
        language:
          type: string
          maxLength: 40
          description: Browser language.
        userAgent:
          type: string
          maxLength: 1024
          description: Browser user agent string.
        screen:
          type: object
          properties:
            width:
              type: integer
              minimum: 0
            height:
              type: integer
              minimum: 0
        viewport:
          type: object
          properties:
            width:
              type: integer
              minimum: 0
            height:
              type: integer
              minimum: 0
    CollectEvent:
      type: object
      description: Custom event data.
      required:
        - name
      properties:
        name:
          type: string
          maxLength: 120
          description: Event name.
        data:
          type: object
          additionalProperties: true
          description: Custom JSON-serializable event payload.
    CollectEngagement:
      type: object
      description: Engagement metrics reported by the client SDK.
      properties:
        durationMs:
          type: integer
          minimum: 0
          description: Engagement duration in milliseconds.
        scrollDepth:
          type: number
          minimum: 0
          maximum: 1
          description: Maximum scroll depth as a 0-1 ratio.
    CollectPerformance:
      type: object
      description: Core Web Vitals and navigation timing data.
      properties:
        ttfb:
          type: number
          minimum: 0
          description: Time to first byte in milliseconds.
        fcp:
          type: number
          minimum: 0
          description: First contentful paint in milliseconds.
        lcp:
          type: number
          minimum: 0
          description: Largest contentful paint in milliseconds.
        cls:
          type: number
          minimum: 0
          description: Cumulative layout shift.
        inp:
          type: number
          minimum: 0
          description: Interaction to next paint in milliseconds.
    CollectPayload:
      type: object
      description:
        Payload sent by the InsightFlare client SDK to ingest pageviews,
        events, engagement, and performance metrics.
      required:
        - siteId
        - type
      properties:
        siteId:
          type: string
          format: uuid
          description: Site identifier.
        type:
          type: string
          enum:
            - pageview
            - event
            - engagement
            - performance
          description:
            Tracking payload type. pageview records a page view; event records
            a custom user-defined event; engagement records duration or scroll;
            performance records Core Web Vitals.
        timestamp:
          type: string
          format: date-time
          description:
            Client-side event time. If omitted, the server receive time may be
            used.
        anonymousId:
          type: string
          maxLength: 120
          description: Anonymous visitor identifier generated by the client SDK.
        sessionId:
          type: string
          maxLength: 120
          description: Client session identifier.
        page:
          $ref: "#/components/schemas/CollectPage"
        client:
          $ref: "#/components/schemas/CollectClient"
        event:
          $ref: "#/components/schemas/CollectEvent"
        engagement:
          $ref: "#/components/schemas/CollectEngagement"
        performance:
          $ref: "#/components/schemas/CollectPerformance"
      additionalProperties: false
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: API key passed as a Bearer token in the Authorization header.
  parameters:
    SiteIdPathParam:
      name: siteId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Site UUID.
    DimensionPathParam:
      name: dimension
      in: path
      required: true
      schema:
        type: string
        maxLength: 120
      description: Stable analytics dimension key.
    EventNamePathParam:
      name: eventName
      in: path
      required: true
      schema:
        type: string
        maxLength: 120
      description: Event name.
    EventIdPathParam:
      name: eventId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Event UUID.
    VisitorIdPathParam:
      name: visitorId
      in: path
      required: true
      schema:
        type: string
        maxLength: 160
      description: Opaque visitor identifier.
    SessionIdPathParam:
      name: sessionId
      in: path
      required: true
      schema:
        type: string
        maxLength: 160
      description: Opaque session identifier.
    FunnelIdPathParam:
      name: funnelId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Funnel UUID.
    FromQueryParam:
      name: from
      in: query
      schema:
        type: string
        format: date-time
      description:
        Inclusive ISO 8601 start time. If from, to, and preset are omitted,
        analytics endpoints default to the last 7 days ending at request time.
    ToQueryParam:
      name: to
      in: query
      schema:
        type: string
        format: date-time
      description:
        Exclusive ISO 8601 end time. If from, to, and preset are omitted,
        analytics endpoints default to the last 7 days ending at request time.
    PresetQueryParam:
      name: preset
      in: query
      schema:
        $ref: "#/components/schemas/Preset"
      description:
        Named time range preset. Mutually exclusive with from and to. If
        from, to, and preset are omitted, analytics endpoints default to the
        last 7 days ending at request time.
    TimeZoneQueryParam:
      name: timeZone
      in: query
      schema:
        type: string
        maxLength: 80
        default: UTC
      description: IANA time zone used to resolve presets. Defaults to UTC.
    IntervalQueryParam:
      name: interval
      in: query
      schema:
        type: string
        enum:
          - minute
          - hour
          - day
          - week
          - month
        default: day
      description: Time bucket granularity.
    MetricsQueryParam:
      name: metrics
      in: query
      style: form
      explode: false
      schema:
        type: array
        items:
          type: string
          enum:
            - views
            - sessions
            - visitors
            - bounces
            - bounceRate
            - avgDurationMs
            - viewsPerSession
            - events
      description: Comma-separated metrics to include.
    FilterQueryParam:
      name: filter
      in: query
      style: deepObject
      explode: true
      schema:
        $ref: "#/components/schemas/FilterObject"
      description: Simple equality filters as filter[field]=value.
    LimitQueryParam:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 1000
        default: 100
      description: Maximum number of results.
    CursorQueryParam:
      name: cursor
      in: query
      schema:
        type: string
        maxLength: 512
      description: Opaque pagination cursor from the previous response.
  responses:
    BadRequest:
      description: Bad request
      content: &a17
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Authentication failed
      content: *a17
    Forbidden:
      description: Insufficient permissions
      content: *a17
    NotFound:
      description: Resource not found
      content: *a17
    Conflict:
      description: Conflict
      content: *a17
    PayloadTooLarge:
      description: Payload too large
      content: *a17
    InternalError:
      description: Internal error
      content: *a17
