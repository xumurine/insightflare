          type: string
        views:
          type: integer
        visitors:
          type: integer
        sessions:
          type: integer
        isOther:
          type: boolean
        isUnknown:
          type: boolean

    BrowserVersionBrowser:
      type: object
      properties:
        browser:
          type: string
        views:
          type: integer
        visitors:
          type: integer
        sessions:
          type: integer
        versions:
          type: array
          items:
            $ref: "#/components/schemas/BrowserVersionEntry"

    # в”Ђв”Ђв”Ђ Funnel в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
    FunnelStep:
      type: object
      required: [type, value]
      properties:
        type:
          type: string
          enum: [pageview, event]
          description: "pageview = match pathname, event = match event name"
        value:
          type: string
          description: Pathname pattern or event name to match

    FunnelDefinition:
      type: object
      properties:
        id:
          type: string
          format: uuid
        siteId:
          type: string
        name:
          type: string
        steps:
          type: array
          items:
            $ref: "#/components/schemas/FunnelStep"
        createdAt:
          type: integer
          description: Unix timestamp in seconds
        updatedAt:
          type: integer
          description: Unix timestamp in seconds

    FunnelAnalysisStep:
      type: object
      description: Analysis result for a single funnel step
      properties:
        index:
          type: integer
        label:
          type: string
        type:
          type: string
          enum: [pageview, event]
        sessions:
          type: integer
        visitors:
          type: integer
        conversionRate:
          type: number
          description: Conversion rate from first step (0-100)
        stepConversionRate:
          type: number
          description: Conversion rate from previous step (0-100)
        dropOffSessions:
          type: integer
        dropOffRate:
          type: number
          description: Drop-off rate from previous step (0-100)

    FunnelAnalysisSummary:
      type: object
      properties:
        totalSessions:
          type: integer
        convertedSessions:
          type: integer
        totalVisitors:
          type: integer
        convertedVisitors:
          type: integer
        overallConversionRate:
          type: number
        largestDropOffStepIndex:
          type: integer

    # в”Ђв”Ђв”Ђ Journey Detail в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
    JourneyEventRow:
