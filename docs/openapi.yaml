        - name: metrics
          in: query
          style: form
          explode: false
          schema:
            type: array
            items:
              type: string
              enum:
                - views
                - sessions
                - visitors
                - bounces
                - bounceRate
                - avgDurationMs
                - viewsPerSession
                - events
          description: Comma-separated metrics to include.
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsBreakdownResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/v1/team/analytics/breakdowns/{dimension}:
    parameters:
      - &a2
        $ref: "#/components/parameters/dimension"
    get:
      operationId: getTeamAnalyticsBreakdown
      summary: Get team analytics breakdown
      description: Breaks down team analytics by a stable dimension.
      tags:
        - Analytics
      parameters:
        - name: from
          in: query
          schema:
            type: string
            format: date-time
          description:
            Inclusive ISO 8601 start time. If from, to, and preset are omitted,
            analytics endpoints default to the last 7 days ending at request
            time.
        - name: to
          in: query
          schema:
            type: string
            format: date-time
          description:
            Exclusive ISO 8601 end time. If from, to, and preset are omitted,
            analytics endpoints default to the last 7 days ending at request
            time.
        - name: preset
          in: query
          schema:
            $ref: "#/components/schemas/Preset"
          description:
            Named time range preset. Mutually exclusive with from and to. If
            from, to, and preset are omitted, analytics endpoints default to the
            last 7 days ending at request time.
        - name: timeZone
          in: query
          schema:
            type: string
            maxLength: 80
            default: UTC
          description: IANA time zone used to resolve presets. Defaults to UTC.
        - name: filter
          in: query
          style: deepObject
          explode: true
          schema:
            $ref: "#/components/schemas/FilterObject"
          description: Simple equality filters as filter[field]=value.
        - name: metrics
          in: query
          style: form
          explode: false
          schema:
            type: array
            items:
              type: string
              enum:
                - views
                - sessions
                - visitors
                - bounces
                - bounceRate
                - avgDurationMs
                - viewsPerSession
                - events
          description: Comma-separated metrics to include.
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 1000
          description: Maximum rows.
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsBreakdownResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/v1/sites:
    get:
      operationId: listSites
      summary: List sites
      description: Returns sites accessible to the current token.
      tags:
        - Sites
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: createSite
      summary: Create site
      description: Creates a site in the token's team. Supports Idempotency-Key.
      tags:
        - Sites
      parameters:
        - name: Idempotency-Key
          in: header
          schema:
            type: string
            maxLength: 200
          description: Client-generated idempotency key.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SiteCreateInput"
      responses:
        "201":
          description: Created site
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
  /api/v1/sites/{siteId}:
    parameters:
      - &a1
        $ref: "#/components/parameters/siteId"
    get:
      operationId: getSite
      summary: Get site
      description: Returns a site by ID.
      tags:
        - Sites
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateSite
      summary: Update site
      description: Updates site metadata.
      tags:
        - Sites
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SiteUpdateInput"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
    delete:
      operationId: deleteSite
      summary: Delete site
      description: Deletes a site and associated analytics data.
      tags:
        - Sites
      responses:
        "204":
          description: No Content
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
