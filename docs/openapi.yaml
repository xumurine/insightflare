              $ref: "#/components/schemas/EventType"
    EventPayloadFilter:
      type: object
      description: Filter applied to custom event payload fields.
      required:
        - path
        - op
      properties:
        path:
          type: string
          maxLength: 240
          description: Dot-notation path inside the event payload.
        op:
          type: string
          description:
            Payload filter operator. eq/neq compare equality, in/notIn compare
            sets, contains/startsWith/endsWith compare strings, gt/gte/lt/lte
            compare ordered values, exists/notExists ignore value.
          enum:
            - eq
            - neq
            - in
            - notIn
            - contains
            - startsWith
            - endsWith
            - gt
            - gte
            - lt
            - lte
            - exists
            - notExists
        value:
          description: Comparison value. Required unless op is exists or notExists.
          oneOf:
            - type: string
            - type: number
            - type: boolean
            - type: array
              items:
                oneOf:
                  - type: string
                  - type: number
                  - type: boolean
      additionalProperties: false
