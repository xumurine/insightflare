        - name: clientScreenSize
          in: query
          schema:
            type: string
          description: Filter by screen size (e.g. 1920x1080)
        - name: geoCountry
          in: query
          schema:
            type: string
          description: Filter by geo country
        - name: geoRegion
          in: query
