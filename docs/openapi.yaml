openapi: 3.1.0
info:
  title: InsightFlare API
  description: >-
    InsightFlare is a privacy-focused web analytics platform. This API allows
    programmatic management of sites and retrieval of analytics data.


    ## Authentication


    All `/api/v1/` endpoints require an API key passed via the `Authorization`
    header:


    ```

    Authorization: Bearer ifk_live_<prefix>.<secret>

    ```


    ## Timestamps


    All timestamps in query parameters (`from`, `to`) are **Unix milliseconds**.

    Timestamps in response objects are **Unix seconds** unless the field name
    contains `Ms`.
  version: 1.0.0
  contact:
    name: InsightFlare
    url: https://github.com/ravelloh/InsightFlare
servers:
  - url: https://insightflare.example.com
    description: Production
security:
  - BearerAuth: []
tags:
  - name: Health
    description: Health check endpoint (no auth required)
  - name: Ingestion
    description: Tracking data collection (no auth required)
  - name: Sites
    description: Create, read, update, and delete analytics sites
  - name: Site Config
    description: Manage site tracking configuration and embed snippets
  - name: Analytics
    description: Query analytics data and team dashboards
  - name: Realtime
    description: Real-time visitor activity and active visitor counts
paths:
  /healthz:
    get:
      operationId: getHealth
      summary: Health check
      description: Returns service health status. No authentication required.
      tags:
        - Health
      security: []
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  service:
                    type: string
                    example: insightflare
                  timestamp:
                    type: string
                    format: date-time
                  bindings:
                    type: object
                    properties:
                      kv:
                        type: boolean
                      d1:
                        type: boolean
                      durableObjects:
                        type: boolean
  /collect:
    post:
      operationId: collectEvent
      summary: Collect tracking event
      description:
        Ingests a tracking event from the InsightFlare client SDK. Always
        returns 204.
      tags:
        - Ingestion
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TrackerClientPayload"
      responses:
        "204":
          description: Event accepted (always returned, even if dropped)
  /api/v1/sites:
    get:
      operationId: listSites
      summary: List sites
      description:
        Returns all sites accessible by the authenticated API key within
        its team.
      tags:
        - Sites
      responses:
        "200":
          description: List of sites
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: createSite
      summary: Create site
      description: Creates a new site within the API key's team.
      tags:
        - Sites
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SiteCreateInput"
      responses:
        "200":
          description: Site created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/v1/sites/{siteId}:
    parameters:
      - $ref: "#/components/parameters/siteId"
    get:
      operationId: getSite
      summary: Get site
      description: Returns a single site by ID.
      tags:
        - Sites
      responses:
        "200":
          description: Site details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateSite
      summary: Update site
      description: Updates site fields. Only provided fields are changed.
      tags:
        - Sites
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SiteUpdateInput"
      responses:
        "200":
          description: Site updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteSite
      summary: Delete site
      description: Permanently deletes a site and all associated data.
      tags:
        - Sites
      responses:
        "200":
          description: Site deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteDeleteResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/sites/{siteId}/config:
    parameters:
      - $ref: "#/components/parameters/siteId"
    get:
      operationId: getSiteConfig
      summary: Get site config
      description: Returns the tracking script configuration for a site.
      tags:
        - Site Config
      responses:
        "200":
          description: Site configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteConfigResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateSiteConfig
      summary: Update site config
      description:
        Updates the tracking script configuration for a site. Only provided
        fields are changed.
      tags:
        - Site Config
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SiteConfigUpdateInput"
      responses:
        "200":
          description: Config updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteConfigResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/sites/{siteId}/script-snippet:
    parameters:
      - $ref: "#/components/parameters/siteId"
    get:
      operationId: getScriptSnippet
      summary: Get script snippet
      description: Returns the HTML snippet to embed the tracking script on a website.
      tags:
        - Site Config
      responses:
        "200":
          description: Script snippet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScriptSnippetResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/sites/{siteId}/analytics/{queryName}:
    parameters:
      - $ref: "#/components/parameters/siteId"
      - name: queryName
        in: path
        required: true
        schema:
          $ref: "#/components/schemas/QueryName"
        description: Analytics query name
    get:
      operationId: queryAnalytics
      summary: Query analytics
      description: Executes an analytics query for the specified site.
      tags:
        - Analytics
      parameters:
        - name: from
          in: query
          schema:
            type: integer
          description: Start timestamp (Unix ms)
        - name: to
          in: query
          schema:
            type: integer
          description: End timestamp (Unix ms)
        - name: interval
          in: query
          schema:
            type: string
            enum:
              - minute
              - hour
              - day
              - week
              - month
        - name: timeZone
          in: query
          schema:
            type: string
          description: IANA timezone
        - name: tz
          in: query
          schema:
            type: string
          description: Alias for timeZone
        - name: limit
          in: query
          schema:
            type: integer
        - name: country
          in: query
          schema:
            type: string
        - name: device
          in: query
          schema:
            type: string
        - name: browser
          in: query
          schema:
            type: string
        - name: path
          in: query
          schema:
            type: string
        - name: title
          in: query
          schema:
            type: string
        - name: hostname
          in: query
          schema:
            type: string
        - name: entry
          in: query
          schema:
            type: string
        - name: exit
          in: query
          schema:
            type: string
        - name: sourceDomain
          in: query
          schema:
            type: string
        - name: sourceLink
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
        - name: pageSize
          in: query
          schema:
            type: integer
        - name: sortBy
          in: query
          schema:
            type: string
        - name: sortDir
          in: query
          schema:
            type: string
            enum:
              - asc
              - desc
        - name: search
          in: query
          schema:
            type: string
        - name: q
          in: query
          schema:
            type: string
        - name: visitorId
          in: query
          schema:
            type: string
            format: uuid
        - name: sessionId
          in: query
          schema:
            type: string
            format: uuid
        - name: eventId
          in: query
          schema:
            type: string
            format: uuid
        - name: eventName
          in: query
          schema:
            type: string
        - name: fieldPath
          in: query
          schema:
            type: string
        - name: fieldValueType
          in: query
          schema:
            type: string
            enum:
              - string
              - number
              - boolean
              - "null"
              - object
              - array
        - name: id
          in: query
          schema:
            type: string
            format: uuid
        - name: granularity
          in: query
          schema:
            type: string
            enum:
              - minute
              - hour
              - day
              - week
              - month
        - name: dimension
          in: query
          schema:
            type: string
        - name: primaryDimension
          in: query
          schema:
            type: string
        - name: secondaryDimension
          in: query
          schema:
            type: string
        - name: primaryLimit
          in: query
          schema:
            type: integer
        - name: secondaryLimit
          in: query
          schema:
            type: integer
        - name: browserLimit
          in: query
          schema:
            type: integer
        - name: versionLimit
          in: query
          schema:
            type: integer
        - name: osLimit
          in: query
          schema:
            type: integer
        - name: deviceTypeLimit
          in: query
          schema:
            type: integer
        - name: filterKey
          in: query
          schema:
            type: string
        - name: query
          in: query
          schema:
            type: string
          description: Filter by page query string
        - name: clientBrowser
          in: query
          schema:
            type: string
        - name: clientOsVersion
          in: query
          schema:
            type: string
        - name: clientDeviceType
          in: query
          schema:
            type: string
        - name: clientLanguage
          in: query
          schema:
            type: string
        - name: clientScreenSize
          in: query
          schema:
            type: string
        - name: geo
          in: query
          schema:
            type: string
          description: Filter by geo (country/region/city)
        - name: geoCountry
          in: query
          schema:
            type: string
        - name: geoRegion
          in: query
          schema:
            type: string
        - name: geoCity
          in: query
          schema:
            type: string
        - name: geoContinent
          in: query
          schema:
            type: string
        - name: geoTimezone
          in: query
          schema:
            type: string
        - name: geoOrganization
          in: query
          schema:
            type: string
        - name: eventPayloadFilters
          in: query
          schema:
            type: string
          description: JSON-encoded array of event payload filter rules
        - name: applyGeoFilter
          in: query
          schema:
            type: boolean
        - name: includeChange
          in: query
          schema:
            type: boolean
        - name: includeDetail
          in: query
          schema:
            type: boolean
        - name: details
          in: query
          schema:
            type: boolean
        - name: fullUrl
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Analytics query result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsQueryParams"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/sites/{siteId}/analytics/funnels/analyze:
    parameters:
      - $ref: "#/components/parameters/siteId"
    post:
      operationId: analyzeFunnel
      summary: Analyze funnel (ad-hoc)
      description: Runs a funnel analysis without saving the funnel definition.
      tags:
        - Analytics
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FunnelAnalyzeInput"
      responses:
        "200":
          description: Funnel analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FunnelAnalyzeResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/v1/sites/{siteId}/analytics/batch:
    parameters:
      - $ref: "#/components/parameters/siteId"
    post:
      operationId: batchAnalytics
      summary: Batch analytics queries
      description: Executes multiple analytics queries in a single request.
      tags:
        - Analytics
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchInput"
      responses:
        "200":
          description: Batch results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/v1/sites/{siteId}/realtime/snapshot:
    parameters:
      - $ref: "#/components/parameters/siteId"
    get:
      operationId: getRealtimeSnapshot
      summary: Realtime snapshot
      description: Returns a snapshot of recent real-time activity for a site.
      tags:
        - Realtime
      parameters:
        - name: from
          in: query
          schema:
            type: integer
          description: Start timestamp (Unix ms)
        - name: to
          in: query
          schema:
            type: integer
          description: End timestamp (Unix ms)
        - name: limit
          in: query
          schema:
            type: integer
            default: 20000
      responses:
        "200":
          description: Realtime snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RealtimeSnapshotResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/sites/{siteId}/realtime/active:
    parameters:
      - $ref: "#/components/parameters/siteId"
    get:
      operationId: getRealtimeActiveVisitors
      summary: Active visitor count
      description: Returns the number of visitors currently active on the site.
      tags:
        - Realtime
      responses:
        "200":
          description: Active visitor count
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActiveVisitorsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/team/dashboard:
    get:
      operationId: getTeamDashboard
      summary: Team dashboard
      description: Returns an aggregated dashboard for the API key's team.
      tags:
        - Analytics
      parameters:
        - name: from
          in: query
          required: true
          schema:
            type: integer
          description: Start timestamp (Unix ms)
        - name: to
          in: query
          required: true
          schema:
            type: integer
          description: End timestamp (Unix ms)
        - name: interval
          in: query
          schema:
            type: string
            enum:
              - minute
              - hour
              - day
              - week
              - month
        - name: timeZone
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Team dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamDashboardResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
components:
  schemas:
    Envelope:
      type: object
      properties:
        ok:
          type: boolean
          const: true
        requestId:
          type: string
          description: Cloudflare Ray ID for request tracing
        timestamp:
          type: string
          description: ISO 8601 response generation time
      required:
        - ok
        - requestId
        - timestamp
      additionalProperties: false
    ErrorEnvelope:
      type: object
      properties:
        ok:
          type: boolean
          const: false
        requestId:
          type: string
        timestamp:
          type: string
        error:
          type: object
          properties:
            code:
              type: string
              description: Machine-readable error code
            message:
              type: string
              description: Human-readable error description
          required:
            - code
            - message
          additionalProperties: false
      required:
        - ok
        - requestId
        - timestamp
        - error
      additionalProperties: false
    PaginationMeta___schema0:
      type: integer
      minimum: -9007199254740991
      maximum: 9007199254740991
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
          minimum: -9007199254740991
          maximum: 9007199254740991
          description: Current page number (1-indexed)
        pageSize:
          type: integer
          minimum: -9007199254740991
          maximum: 9007199254740991
          description: Results per page
        returned:
          type: integer
          minimum: -9007199254740991
          maximum: 9007199254740991
          description: Number of results in this page
        hasMore:
          type: boolean
          description: Whether more pages exist
        nextPage:
          anyOf:
            - $ref: "#/components/schemas/PaginationMeta___schema0"
            - type: "null"
          description: Next page number, or null
      required:
        - page
        - pageSize
        - returned
        - hasMore
        - nextPage
      additionalProperties: false
    Interval:
      type: string
      enum:
        - minute
        - hour
        - day
        - week
        - month
    QueryName:
      type: string
      enum:
        - overview
        - trend
        - pages
        - referrers
        - funnels
        - pages-dashboard
        - page-hash
        - page-query
        - event-types
        - events-summary
        - events-trend
        - events-records
        - event-type-field-values
        - event-type-detail
        - event-record-detail
        - sessions
        - session-detail
        - visitors
        - visitor-detail
        - retention
        - performance
        - browser-trend
        - browser-engine-trend
        - browser-version-breakdown
        - browser-cross-breakdown
        - browser-radar
        - referrer-radar
        - referrer-dimension-trend
        - client-dimension-trend
        - utm-dimension-trend
        - client-cross-breakdown
        - utm-source
        - utm-medium
        - utm-campaign
        - utm-term
        - utm-content
        - countries
        - filter-options
        - overview-page-path
        - overview-page-title
        - overview-page-hostname
        - overview-page-entry
        - overview-page-exit
        - overview-source-domain
        - overview-source-link
        - overview-client-browser
        - overview-client-os-version
        - overview-client-device-type
        - overview-client-language
        - overview-client-screen-size
        - overview-geo-country
        - overview-geo-region
        - overview-geo-city
        - overview-geo-continent
        - overview-geo-timezone
        - overview-geo-organization
        - overview-geo-points
    DashboardFilters:
      type: object
      properties:
        country:
          type: string
        device:
          type: string
        browser:
          type: string
        path:
          type: string
        query:
          type: string
        title:
          type: string
        hostname:
          type: string
        entry:
          type: string
        exit:
          type: string
        sourceDomain:
          type: string
        sourceLink:
          type: string
        clientBrowser:
          type: string
        clientOsVersion:
          type: string
        clientDeviceType:
          type: string
        clientLanguage:
          type: string
        clientScreenSize:
          type: string
        geo:
          type: string
        geoCountry:
          type: string
        geoRegion:
          type: string
        geoCity:
          type: string
        geoContinent:
          type: string
        geoTimezone:
          type: string
        geoOrganization:
          type: string
      additionalProperties: false
    AnalyticsQueryParams___schema0:
      type: integer
      minimum: -9007199254740991
      maximum: 9007199254740991
    AnalyticsQueryParams___schema1:
      type: integer
      minimum: -9007199254740991
      maximum: 9007199254740991
    AnalyticsQueryParams___schema2:
      type: string
    AnalyticsQueryParams___schema3:
      type: string
    AnalyticsQueryParams:
      type: object
      properties:
        from:
          description: Start timestamp (Unix ms)
          $ref: "#/components/schemas/AnalyticsQueryParams___schema0"
        to:
          description: End timestamp (Unix ms)
          $ref: "#/components/schemas/AnalyticsQueryParams___schema1"
        interval:
          default: day
          type: string
          enum:
            - minute
            - hour
            - day
            - week
            - month
        timeZone:
          description: IANA timezone identifier
          $ref: "#/components/schemas/AnalyticsQueryParams___schema2"
        tz:
          description: Alias for timeZone
          $ref: "#/components/schemas/AnalyticsQueryParams___schema3"
        limit:
          type: integer
          minimum: -9007199254740991
          maximum: 9007199254740991
      required:
        - interval
      additionalProperties: false
    PaginatedQueryParams___schema0:
      type: integer
      minimum: -9007199254740991
      maximum: 9007199254740991
    PaginatedQueryParams___schema1:
      type: integer
      minimum: -9007199254740991
      maximum: 9007199254740991
    PaginatedQueryParams___schema2:
      type: string
    PaginatedQueryParams___schema3:
      type: string
    PaginatedQueryParams___schema4:
      type: string
    PaginatedQueryParams:
      type: object
      properties:
        from:
          description: Start timestamp (Unix ms)
          $ref: "#/components/schemas/PaginatedQueryParams___schema0"
        to:
          description: End timestamp (Unix ms)
          $ref: "#/components/schemas/PaginatedQueryParams___schema1"
        interval:
          default: day
          type: string
          enum:
            - minute
            - hour
            - day
            - week
            - month
        timeZone:
          description: IANA timezone identifier
          $ref: "#/components/schemas/PaginatedQueryParams___schema2"
        tz:
          description: Alias for timeZone
          $ref: "#/components/schemas/PaginatedQueryParams___schema3"
        limit:
          type: integer
          minimum: -9007199254740991
          maximum: 9007199254740991
        page:
          default: 1
          type: integer
          minimum: 1
          maximum: 9007199254740991
        pageSize:
          type: integer
          minimum: -9007199254740991
          maximum: 9007199254740991
        sortBy:
          type: string
        sortDir:
          default: desc
          type: string
          enum:
            - asc
            - desc
        search:
          type: string
        q:
          description: Alias for search
          $ref: "#/components/schemas/PaginatedQueryParams___schema4"
      required:
        - interval
        - page
        - sortDir
      additionalProperties: false
    OverviewData:
      type: object
      properties:
        views:
          type: integer
          minimum: -9007199254740991
          maximum: 9007199254740991
        sessions:
          type: integer
          minimum: -9007199254740991
          maximum: 9007199254740991
        visitors:
          type: integer
          minimum: -9007199254740991
          maximum: 9007199254740991
        bounces:
          type: integer
          minimum: -9007199254740991
          maximum: 9007199254740991
        totalDurationMs:
          type: integer
          minimum: -9007199254740991
          maximum: 9007199254740991
        avgDurationMs:
          type: number
        bounceRate:
          type: number
        approximateVisitors:
          type: boolean
      required:
        - views
        - sessions
        - visitors
        - bounces
        - totalDurationMs
        - avgDurationMs
        - bounceRate
        - approximateVisitors
      additionalProperties: false
