          $ref: "#/components/schemas/PerformanceMetrics"

    # в”Ђв”Ђв”Ђ Performance Metrics в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
    PerformanceMetrics:
      type: object
      description: Core Web Vitals metrics
      properties:
        ttfb:
          type: number
          description: Time to First Byte (ms)
        fcp:
          type: number
          description: First Contentful Paint (ms)
        lcp:
          type: number
          description: Largest Contentful Paint (ms)
        cls:
          type: number
          description: Cumulative Layout Shift
        inp:
          type: number
          description: Interaction to Next Paint (ms)

    # в”Ђв”Ђв”Ђ Performance Summary в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
    PerformanceSummaryStats:
      type: object
