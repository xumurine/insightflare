components:
  schemas:
    Meta:
      type: object
      description: Response metadata.
      required:
        - generatedAt
      properties:
        requestId:
          type: string
          description: Request correlation identifier.
        generatedAt:
          type: string
          format: date-time
          description: Response generation time in UTC.
        timeRange:
          $ref: "#/components/schemas/TimeRange"
        interval:
          type: string
          enum:
            - minute
            - hour
            - day
            - week
            - month
        partialFailure:
          type: boolean
      additionalProperties: true
    LinkMap:
      type: object
      description: Machine-readable links for resource discovery.
      additionalProperties:
        type: string
    SuccessEnvelope:
      type: object
      description: Standard successful response envelope.
      required:
        - data
        - meta
      properties:
        data: {}
        links:
          $ref: "#/components/schemas/LinkMap"
        meta:
          $ref: "#/components/schemas/Meta"
      additionalProperties: false
    ListEnvelope:
      type: object
      description: Standard list response envelope.
      required:
        - data
        - meta
      properties:
        data:
          type: array
          items: {}
        links:
          $ref: "#/components/schemas/LinkMap"
        meta:
          $ref: "#/components/schemas/Meta"
      additionalProperties: false
    Pagination:
      type: object
      description: Cursor pagination state.
      required:
        - limit
        - nextCursor
        - hasMore
      properties:
        limit:
          type: integer
          minimum: 1
          maximum: 1000
        nextCursor:
          type:
            - string
            - "null"
          maxLength: 512
        hasMore:
          type: boolean
    PaginatedEnvelope:
      type: object
      description: Standard cursor-paginated list response envelope.
      required:
        - data
        - pagination
        - meta
      properties:
        data:
          type: array
          items: {}
        pagination:
          $ref: "#/components/schemas/Pagination"
        links:
          $ref: "#/components/schemas/LinkMap"
        meta:
          $ref: "#/components/schemas/Meta"
      additionalProperties: false
    ErrorResponse:
      type: object
      description: Standard error response envelope.
      example:
        error:
          code: validation_failed
          message: Invalid request body.
          details:
            field: steps
          help:
            token: /api/v1/token
            documentation: /.well-known/openapi.json
        meta:
          requestId: req_abc123
          generatedAt: 2026-06-26T12:00:00Z
      required:
        - error
        - meta
      properties:
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
              enum:
                - invalid_request
                - invalid_json
                - validation_failed
                - invalid_api_key
                - api_key_expired
                - api_key_revoked
                - insufficient_scope
                - site_not_found
                - resource_not_found
                - conflict
                - payload_too_large
                - internal_error
            message:
              type: string
            details:
              type: object
              additionalProperties: true
            help:
              type: object
              properties:
                token:
                  type: string
                documentation:
                  type: string
        meta:
          $ref: "#/components/schemas/Meta"
    Preset:
      type: string
      description:
        "Named time range preset. today: current calendar day in timeZone.
        yesterday: previous calendar day. last_7_days and last_30_days end at
        request time. this_week/last_week and this_month/last_month use calendar
        boundaries in timeZone."
      enum:
        - today
        - yesterday
        - last_7_days
        - last_30_days
        - this_week
        - last_week
        - this_month
        - last_month
    TimeRange:
      type: object
      description: Resolved inclusive/exclusive time range.
      required:
        - from
        - to
        - timeZone
      properties:
        from:
          type: string
          format: date-time
          description: Inclusive start time.
        to:
          type: string
          format: date-time
          description: Exclusive end time.
        timeZone:
          type: string
          maxLength: 80
    TimeRangeInput:
      type: object
      description:
        Optional time range input. If from, to, and preset are omitted,
        analytics endpoints default to the last 7 days ending at request time.
        The default timeZone is UTC.
      properties:
        from:
          type: string
          format: date-time
          description: Inclusive ISO 8601 start time.
        to:
          type: string
          format: date-time
          description: Exclusive ISO 8601 end time.
        preset:
          $ref: "#/components/schemas/Preset"
        timeZone:
          type: string
          maxLength: 80
          default: UTC
          description: IANA time zone used to resolve presets.
    FilterObject:
      type: object
      description: Simple equality filters keyed by stable dimension name.
      additionalProperties:
        type: string
        maxLength: 500
    ComplexFilter:
      type: object
      description:
        "Advanced filter rule for explore and search endpoints. Operators:
        eq equals; neq does not equal; in is one of; notIn is not one of;
        contains includes substring; startsWith/endsWith match string edges;
        gt/gte/lt/lte compare ordered values; exists/notExists ignore value."
      required:
        - field
        - op
      properties:
        field:
          type: string
          maxLength: 120
          description: Stable filter field path.
        op:
          type: string
          description:
            Filter operator. exists and notExists ignore value; in and notIn
            expect an array-compatible value.
          enum:
            - eq
            - neq
            - in
            - notIn
            - contains
            - startsWith
            - endsWith
            - gt
            - gte
            - lt
            - lte
            - exists
            - notExists
        value: {}
    MetricDefinition:
