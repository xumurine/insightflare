            $ref: "#/components/schemas/TeamDashboardSite"
        trend:
          type: array
          items:
            $ref: "#/components/schemas/TeamDashboardTrendPoint"

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          example:
            ok: false
            requestId: a1111697fbf911e8
            timestamp: "2026-06-25T12:00:00.000Z"
            error:
              code: bad_request
              message: name and domain are required

    Unauthorized:
      description: Authentication failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          examples:
            invalid_key:
              summary: Invalid API key
              value:
                ok: false
                requestId: a1111697fbf911e8
                timestamp: "2026-06-25T12:00:00.000Z"
                error:
                  code: invalid_api_key
                  message: Invalid or missing API key
            expired:
              summary: Expired API key
              value:
                ok: false
                requestId: a1111697fbf911e8
                timestamp: "2026-06-25T12:00:00.000Z"
                error:
                  code: api_key_expired
                  message: API key has expired
            revoked:
              summary: Revoked API key
              value:
                ok: false
                requestId: a1111697fbf911e8
                timestamp: "2026-06-25T12:00:00.000Z"
                error:
                  code: api_key_revoked
                  message: API key has been revoked

    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          example:
            ok: false
            requestId: a1111697fbf911e8
            timestamp: "2026-06-25T12:00:00.000Z"
            error:
              code: insufficient_scope
              message: Insufficient scope for this action

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          example:
            ok: false
            requestId: a1111697fbf911e8
            timestamp: "2026-06-25T12:00:00.000Z"
            error:
              code: not_found
              message: Site not found

    TooManyRequests:
      description: Rate limit exceeded (not currently enforced, reserved for future use)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          example:
            ok: false
            requestId: a1111697fbf911e8
            timestamp: "2026-06-25T12:00:00.000Z"
            error:
              code: rate_limited
              message: Too many requests, please try again later
