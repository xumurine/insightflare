        visitors:
          type: integer
        sessions:
          type: integer
        isOther:
          type: boolean
        isUnknown:
          type: boolean

    CrossBreakdownRow:
      type: object
      properties:
        key:
          type: string
        label:
          type: string
        views:
          type: integer
        visitors:
          type: integer
        sessions:
          type: integer
        isOther:
          type: boolean
        isUnknown:
          type: boolean
        cells:
          type: array
          items:
            $ref: "#/components/schemas/CrossBreakdownCell"

    CrossBreakdownMatrix:
      type: object
