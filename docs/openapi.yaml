  /api/v1/sites/{siteId}/realtime/snapshot:
    parameters:
      - $ref: "#/components/parameters/siteId"
    get:
      operationId: getRealtimeSnapshot
      summary: Realtime snapshot
      description: Returns a snapshot of recent real-time activity for a site.
      tags:
        - Realtime
      parameters:
        - name: from
          in: query
          schema:
            type: integer
          description: Start timestamp (Unix ms)
        - name: to
          in: query
          schema:
            type: integer
          description: End timestamp (Unix ms)
        - name: limit
          in: query
          schema:
            type: integer
            default: 20000
          description: Max events to return
      responses:
        "200":
          description: Realtime snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RealtimeSnapshotResponse"
              example:
                ok: true
                requestId: abc123def456
                timestamp: 2026-06-26T12:00:00Z
                data:
                  activeNow: 42
                  events:
                    - visitorId: v1
                      sessionId: s1
                      kind: pageview
                      pathname: /
                      timestamp: 1719403200
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/sites/{siteId}/realtime/active:
    parameters:
      - $ref: "#/components/parameters/siteId"
    get:
      operationId: getRealtimeActiveVisitors
      summary: Active visitor count
      description: Returns the number of visitors currently active on the site.
      tags:
        - Realtime
      responses:
        "200":
          description: Active visitor count
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActiveVisitorsResponse"
              example:
                ok: true
                requestId: abc123def456
                timestamp: 2026-06-26T12:00:00Z
                data:
                  activeNow: 42
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/team/dashboard:
    get:
      operationId: getTeamDashboard
      summary: Team dashboard
      description: Returns an aggregated dashboard for the API key's team.
      tags:
        - Analytics
      parameters:
        - name: from
          in: query
          schema:
            type: integer
          description: Start timestamp (Unix ms, defaults to 24h ago)
        - name: to
          in: query
          schema:
            type: integer
          description: End timestamp (Unix ms, defaults to now)
        - name: interval
          in: query
          schema:
            type: string
            enum:
              - minute
              - hour
              - day
              - week
              - month
          description: Time bucket granularity
        - name: timeZone
          in: query
          schema:
            type: string
          description: IANA timezone identifier
      responses:
        "200":
          description: Team dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamDashboardResponse"
              example:
                ok: true
                requestId: abc123def456
                timestamp: 2026-06-26T12:00:00Z
                data:
                  sites:
                    - siteId: "550e8400"
                      name: My Site
                      domain: example.com
                      views: 12500
                      visitors: 6100
                      sessions: 8300
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
