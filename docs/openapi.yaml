openapi: 3.1.0
info:
  title: InsightFlare API
  description:
    Privacy-focused web analytics API. Authenticated endpoints require
    an API key passed as a Bearer token in the Authorization header. All API
    times are ISO 8601 strings and analytics ranges use [from, to) semantics. If
    from, to, and preset are omitted, analytics endpoints default to the last 7
    days ending at request time. The default timeZone is UTC.
  version: 1.0.0
  contact:
    name: InsightFlare
    url: https://github.com/ravelloh/InsightFlare
  license:
    name: MIT
    url: https://github.com/ravelloh/InsightFlare/blob/main/LICENSE
servers:
  - url: https://insight.ravelloh.com
    description: Production
security:
  - BearerAuth: []
tags:
  - name: Discovery
    description: API discovery and capabilities
  - name: Token
    description: Token introspection
  - name: Team
    description: Current team resources
  - name: Sites
    description: Site resources
  - name: Settings
    description: Tracking, privacy, and sharing settings
  - name: Analytics
    description: Analytics data primitives
  - name: Events
    description: Event resources
  - name: Visitors
    description: Visitor resources
  - name: Sessions
    description: Session resources
  - name: Funnels
    description: Funnel resources and analysis
  - name: Performance
    description: Core Web Vitals performance data
  - name: Realtime
    description: Realtime activity
  - name: Batch
    description: Global batch requests
  - name: Ingestion
    description: Client SDK event collection
  - name: Health
    description: Health checks
paths:
  /healthz:
    get:
      operationId: getHealth
      summary: Health check
      description: Returns service health status. No authentication required.
      tags:
        - Health
      security: []
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericObjectResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /collect:
    post:
      operationId: collectEvent
      summary: Collect tracking event
      description:
        /collect is the unauthenticated client SDK ingestion endpoint.
        Successful receipt or silent drop returns 204.
      tags:
        - Ingestion
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CollectPayload"
      responses:
        "204":
          description: No Content
        "400":
          $ref: "#/components/responses/BadRequest"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
  /api/v1:
    get:
      operationId: getApiRoot
      summary: API root discovery
      description:
        Returns stable machine-readable discovery links. No authentication
        required.
      tags:
        - Discovery
      security: []
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RootDiscoveryResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/token:
    get:
      operationId: getToken
      summary: Inspect current token
      description:
        Returns non-secret metadata, scopes, team, and site access for the
        current bearer token.
      tags:
        - Token
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/v1/token/check:
    post:
      operationId: checkToken
      summary: Check token permissions
      description:
        Checks whether the current token has requested scope and optional
        site permissions.
      tags:
        - Token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TokenCheckRequest"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenCheckResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/v1/capabilities:
    get:
      operationId: getCapabilities
      summary: Get runtime capabilities
      description: Returns features and limits available to the current token.
      tags:
        - Discovery
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CapabilitiesResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/v1/team:
    get:
      operationId: getTeam
      summary: Get current team
      description: Returns the team associated with the current token.
      tags:
        - Team
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/v1/team/usage:
    get:
      operationId: getTeamUsage
      summary: Get team usage
      description: Returns usage information for the current team.
      tags:
        - Team
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamUsageResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/v1/team/analytics/overview:
    get:
      operationId: getTeamAnalyticsOverview
      summary: Get team analytics overview
      description: Aggregates analytics over sites accessible to the current token.
      tags:
        - Analytics
      parameters:
        - name: from
          in: query
          schema:
            type: string
            format: date-time
          description:
            Inclusive ISO 8601 start time. If from, to, and preset are omitted,
            analytics endpoints default to the last 7 days ending at request
            time.
        - name: to
          in: query
          schema:
            type: string
            format: date-time
          description:
            Exclusive ISO 8601 end time. If from, to, and preset are omitted,
            analytics endpoints default to the last 7 days ending at request
            time.
        - name: preset
          in: query
          schema:
            $ref: "#/components/schemas/Preset"
          description:
            Named time range preset. Mutually exclusive with from and to. If
            from, to, and preset are omitted, analytics endpoints default to the
            last 7 days ending at request time.
        - name: timeZone
          in: query
          schema:
            type: string
            maxLength: 80
            default: UTC
          description: IANA time zone used to resolve presets. Defaults to UTC.
        - name: filter
          in: query
          style: deepObject
          explode: true
          schema:
            $ref: "#/components/schemas/FilterObject"
          description: Simple equality filters as filter[field]=value.
        - name: metrics
          in: query
          style: form
          explode: false
          schema:
            type: array
            items:
              type: string
              enum:
                - views
                - sessions
                - visitors
                - bounces
                - bounceRate
                - avgDurationMs
                - viewsPerSession
                - events
          description: Comma-separated metrics to include.
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsOverviewResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/v1/team/analytics/timeseries:
    get:
      operationId: getTeamAnalyticsTimeseries
      summary: Get team analytics time series
      description: Returns time-bucketed analytics over accessible sites.
      tags:
        - Analytics
      parameters:
        - name: from
          in: query
          schema:
            type: string
            format: date-time
          description:
            Inclusive ISO 8601 start time. If from, to, and preset are omitted,
            analytics endpoints default to the last 7 days ending at request
            time.
        - name: to
          in: query
          schema:
            type: string
            format: date-time
          description:
            Exclusive ISO 8601 end time. If from, to, and preset are omitted,
            analytics endpoints default to the last 7 days ending at request
            time.
        - name: preset
          in: query
          schema:
            $ref: "#/components/schemas/Preset"
          description:
            Named time range preset. Mutually exclusive with from and to. If
            from, to, and preset are omitted, analytics endpoints default to the
            last 7 days ending at request time.
        - name: timeZone
          in: query
          schema:
            type: string
            maxLength: 80
            default: UTC
          description: IANA time zone used to resolve presets. Defaults to UTC.
        - name: interval
          in: query
          schema:
            type: string
            enum:
              - minute
              - hour
              - day
              - week
              - month
            default: day
          description: Time bucket granularity.
        - name: filter
          in: query
          style: deepObject
          explode: true
          schema:
            $ref: "#/components/schemas/FilterObject"
          description: Simple equality filters as filter[field]=value.
        - name: metrics
          in: query
          style: form
          explode: false
          schema:
            type: array
            items:
              type: string
              enum:
                - views
                - sessions
                - visitors
                - bounces
                - bounceRate
                - avgDurationMs
                - viewsPerSession
                - events
          description: Comma-separated metrics to include.
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsTimeseriesResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/v1/team/analytics/sites:
    get:
      operationId: getTeamAnalyticsSites
      summary: Get team analytics by site
      description: Breaks down team analytics by accessible site.
      tags:
