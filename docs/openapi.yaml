        periods:
          type: array
          items:
            $ref: "#/components/schemas/RetentionCohortPeriod"

    # в”Ђв”Ђв”Ђ Team Dashboard в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
    TeamDashboardSiteOverview:
      type: object
      properties:
        views:
          type: integer
        sessions:
          type: integer
        visitors:
          type: integer
        bounces:
          type: integer
        totalDurationMs:
          type: integer
        avgDurationMs:
          type: number
        bounceRate:
          type: number
        approximateVisitors:
          type: boolean

    TeamDashboardSite:
      type: object
      properties:
        id:
          type: string
          format: uuid
        teamId:
          type: string
          format: uuid
        name:
          type: string
        domain:
          type: string
        publicEnabled:
          type: boolean
        publicSlug:
          type: string
        createdAt:
          type: integer
        updatedAt:
          type: integer
        overview:
          $ref: "#/components/schemas/TeamDashboardSiteOverview"
