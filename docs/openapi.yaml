    # в”Ђв”Ђв”Ђ Radar в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
    RadarEntry:
      type: object
      description: Browser or referrer radar entry with normalized metrics (0-1)
      properties:
        browser:
          type: string
          description: Browser name (browser-radar)
        referrer:
          type: string
          description: Referrer domain (referrer-radar)
        visitors:
          type: integer
        sessions:
          type: integer
        metrics:
          type: object
          properties:
            duration:
              type: number
              description: Normalized avg session duration
            engagement:
              type: number
              description: Normalized engagement score
            depth:
              type: number
              description: Normalized pages per session
            loyalty:
              type: number
              description: Normalized return visitor rate
            frequency:
              type: number
              description: Normalized visit frequency
            traffic:
              type: number
              description: Normalized traffic share

    # в”Ђв”Ђв”Ђ Version Breakdown в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
    BrowserVersionEntry:
      type: object
