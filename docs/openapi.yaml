        visitorId:
          type: string
        pathname:
          type: string
        hash:
          type: string
        title:
          type: string
        hostname:
          type: string
        referrerHost:
          type: string
        referrerUrl:
          type: string
        country:
          type: string
        region:
          type: string
        city:
          type: string
        browser:
          type: string
        browserVersion:
          type: string
        os:
          type: string
        osVersion:
          type: string
        deviceType:
          type: string
        screenWidth:
          type: integer
        screenHeight:
          type: integer
        durationMs:
          type: integer
