              id:
                type: string
                maxLength: 80
              method:
                type: string
                enum:
                  - GET
              path:
                type: string
                maxLength: 2048
              query:
                type: object
                additionalProperties:
                  type: string
                  maxLength: 500
    BatchResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          description: Successful response
          properties:
            data:
              type: object
              properties:
                responses:
                  type: array
                  items:
                    type: object
                    properties:
                      id:
                        type: string
                      status:
                        type: integer
                      body: {}
    HealthResponse:
      type: object
      description: Service health response.
      properties:
        status:
          type: string
          enum:
            - healthy
        timestamp: *a15
    CollectPage:
      type: object
      description: Page context for a collect payload.
      properties:
        url:
          type: string
          maxLength: 2048
          description: Full page URL.
        path:
          type: string
          maxLength: 2048
          description: Page path.
        title:
          type: string
          maxLength: 300
          description: Page title.
        referrer:
          type:
            - string
            - "null"
          maxLength: 2048
          description: Full referrer URL, if available.
        hostname:
          type: string
          maxLength: 255
          description: Page hostname.
        query:
          type: string
          maxLength: 2048
          description: URL query string.
        hash:
          type: string
          maxLength: 512
          description: URL hash fragment.
    CollectClient:
      type: object
      description: Browser and device context reported by the client SDK.
      properties:
        language:
          type: string
          maxLength: 40
          description: Browser language.
        userAgent:
          type: string
          maxLength: 1024
          description: Browser user agent string.
        screen:
          type: object
          properties:
            width:
              type: integer
              minimum: 0
            height:
              type: integer
              minimum: 0
        viewport:
          type: object
          properties:
            width:
              type: integer
              minimum: 0
            height:
              type: integer
              minimum: 0
    CollectEvent:
      type: object
      description: Custom event data.
      required:
        - name
      properties:
        name:
          type: string
          maxLength: 120
          description: Event name.
        data:
          type: object
          additionalProperties: true
          description: Custom JSON-serializable event payload.
    CollectEngagement:
      type: object
      description: Engagement metrics reported by the client SDK.
      properties:
        durationMs:
          type: integer
          minimum: 0
          description: Engagement duration in milliseconds.
        scrollDepth:
          type: number
          minimum: 0
          maximum: 1
          description: Maximum scroll depth as a 0-1 ratio.
    CollectPerformance:
      type: object
      description: Core Web Vitals and navigation timing data.
      properties:
        ttfb:
          type: number
          minimum: 0
          description: Time to first byte in milliseconds.
        fcp:
          type: number
          minimum: 0
          description: First contentful paint in milliseconds.
        lcp:
          type: number
          minimum: 0
          description: Largest contentful paint in milliseconds.
        cls:
          type: number
          minimum: 0
          description: Cumulative layout shift.
        inp:
          type: number
          minimum: 0
          description: Interaction to next paint in milliseconds.
    CollectPayload:
      type: object
      description:
        Payload sent by the InsightFlare client SDK to ingest pageviews,
        events, engagement, and performance metrics.
      required:
        - siteId
        - type
      properties:
        siteId:
          type: string
          format: uuid
          description: Site identifier.
        type:
          type: string
          enum:
            - pageview
            - event
            - engagement
            - performance
          description:
            Tracking payload type. pageview records a page view; event records
            a custom user-defined event; engagement records duration or scroll;
            performance records Core Web Vitals.
        timestamp:
          type: string
          format: date-time
          description:
            Client-side event time. If omitted, the server receive time may be
            used.
        anonymousId:
          type: string
          maxLength: 120
          description: Anonymous visitor identifier generated by the client SDK.
        sessionId:
          type: string
          maxLength: 120
          description: Client session identifier.
        page:
          $ref: "#/components/schemas/CollectPage"
        client:
          $ref: "#/components/schemas/CollectClient"
        event:
          $ref: "#/components/schemas/CollectEvent"
        engagement:
          $ref: "#/components/schemas/CollectEngagement"
        performance:
          $ref: "#/components/schemas/CollectPerformance"
      additionalProperties: false
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: API key passed as a Bearer token in the Authorization header.
  parameters:
    siteId:
      name: siteId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Site UUID.
    dimension:
      name: dimension
      in: path
      required: true
      schema:
        type: string
        maxLength: 120
      description: Stable analytics dimension key.
    eventName:
      name: eventName
      in: path
      required: true
      schema:
        type: string
        maxLength: 120
      description: Event name.
    eventId:
      name: eventId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Event UUID.
    visitorId:
      name: visitorId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Visitor UUID.
    sessionId:
      name: sessionId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Session UUID.
    funnelId:
      name: funnelId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Funnel UUID.
  responses:
    BadRequest:
      description: Bad request
      content: &a16
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Authentication failed
      content: *a16
    Forbidden:
      description: Insufficient permissions
      content: *a16
    NotFound:
      description: Resource not found
      content: *a16
    Conflict:
      description: Conflict
      content: *a16
    PayloadTooLarge:
      description: Payload too large
      content: *a16
    InternalError:
      description: Internal error
      content: *a16
