      と通常リクエストのデータセットはデプロイ時に自動作成・バインドされます。
    - My Profile → API Tokens に移動し、Custom token を作成します。
    - トークンに Account Analytics の読み取り権限を付与し、現在のアカウントにスコープします。
    - トークンをコピーし、ここに Account ID と API トークンを入力します。
