  subtitle: Manage instance-wide configuration for this InsightFlare deployment.
  guide: Guide
  botAnalyticsTitle: Analytics Engine
  botAnalyticsDescription: Configure the Cloudflare credentials used to read
    Analytics Engine data for Bot Protection and other analysis features.
  botAnalyticsAccountIdLabel: Cloudflare Account ID
  botAnalyticsApiTokenLabel: Cloudflare API token
  botAnalyticsApiTokenPlaceholder: View the guide to get a Cloudflare API token
  botAnalyticsSaved: Analytics Engine configuration saved.
