name = "insightflare"
main = "./workers/cf-worker.js"
compatibility_date = "2026-03-01"
workers_dev = true
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]

[assets]
directory = "./.open-next/assets"
binding = "ASSETS"

[vars]
SESSION_WINDOW_MINUTES = "30"
SCRIPT_CACHE_TTL_SECONDS = "3600"
PARQUET_WASM_URL = "https://cdn.jsdelivr.net/npm/parquet-wasm@0.7.1/esm/parquet_wasm_bg.wasm"

[triggers]
crons = ["*/30 * * * *"]

[observability]
[observability.logs]
enabled = true
invocation_logs = true

[[durable_objects.bindings]]
name = "INGEST_DO"
class_name = "IngestDurableObject"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["IngestDurableObject"]

[[d1_databases]]
binding = "DB"
database_name = "insightflare"
