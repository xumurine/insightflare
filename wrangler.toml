# Optional: enable when archive-to-R2 is configured.
# [[r2_buckets]]
# binding = "ARCHIVE_BUCKET"
# bucket_name = "insightflare-archive"
# preview_bucket_name = "insightflare-archive-preview"

# Maintainer environment. Normal Deploy Button users should use the default
# environment above, which intentionally leaves R2 unbound.

[env.ravelloh]
name = "ravelloh"

[env.ravelloh.vars]
SESSION_WINDOW_MINUTES = "30"
SCRIPT_CACHE_TTL_SECONDS = "3600"
PARQUET_WASM_URL = "https://cdn.jsdelivr.net/npm/parquet-wasm@0.7.1/esm/parquet_wasm_bg.wasm"

[env.ravelloh.triggers]
crons = ["*/30 * * * *"]

[[env.ravelloh.durable_objects.bindings]]
name = "INGEST_DO"
class_name = "IngestDurableObject"

[[env.ravelloh.migrations]]
tag = "v1"
new_sqlite_classes = ["IngestDurableObject"]

[[env.ravelloh.d1_databases]]
binding = "DB"
database_name = "insightflare"
database_id = "391c1df6-dd3f-44f0-991c-63c7873b7d6a"
migrations_dir = "./migrations"

[[env.ravelloh.kv_namespaces]]
binding = "SITE_SETTINGS_KV"
id = "dbef57f92fc748e4929303ac5153045e"

[[env.ravelloh.analytics_engine_datasets]]
binding = "BOT_ANALYTICS"
dataset = "insightflare_bot_events"

[[env.ravelloh.r2_buckets]]
binding = "ARCHIVE_BUCKET"
bucket_name = "insightflare-archive"
preview_bucket_name = "insightflare-archive-preview"
