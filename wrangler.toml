name = "insightflare"
main = "./workers/cf-worker.js"
compatibility_date = "2026-03-01"
workers_dev = true
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]

[assets]
directory = "./.open-next/assets"
binding = "ASSETS"

[vars]
SESSION_WINDOW_MINUTES = "30" # 会话窗口大小，单位：分钟
SCRIPT_CACHE_TTL_SECONDS = "3600" # 脚本缓存时间，单位：秒
PARQUET_WASM_URL = "https://cdn.jsdelivr.net/npm/parquet-wasm@0.7.1/esm/parquet_wasm_bg.wasm" # Parquet WASM 模块 URL
INSIGHTFLARE_EDGE_URL="https://insight.ravelloh.com" # InsightFlare 服务基准 URL（可指向当前后端域名）

[triggers]
crons = ["0 * * * *"]

[observability]
[observability.logs]
enabled = true
invocation_logs = true

[[durable_objects.bindings]]
name = "INGEST_DO"
class_name = "IngestDurableObject"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["IngestDurableObject"]

[[d1_databases]]
binding = "DB"
database_name = "insightflare"
database_id = "YOUR_D1_ID" # 改成你自己的 D1 数据库 ID 
migrations_dir = "./migrations"

[[kv_namespaces]]
binding = "SITE_SETTINGS_KV"
id = "YOUR_KV_ID" # 改成你自己的 KV 命名空间 ID

# Optional: enable when archive-to-R2 is configured.
# [[r2_buckets]]
# binding = "ARCHIVE_BUCKET"
# bucket_name = "insightflare-archive"
# preview_bucket_name = "insightflare-archive-preview"

# Maintainer environment. Normal Deploy Button users should use the default
# environment above, which intentionally leaves R2 unbound.

[env.ravelloh]
name = "ravelloh"

[env.ravelloh.vars]
SESSION_WINDOW_MINUTES = "30"
SCRIPT_CACHE_TTL_SECONDS = "3600"
PARQUET_WASM_URL = "https://cdn.jsdelivr.net/npm/parquet-wasm@0.7.1/esm/parquet_wasm_bg.wasm"
INSIGHTFLARE_EDGE_URL = "https://insight.ravelloh.com"

[env.ravelloh.triggers]
crons = ["0 * * * *"]

[[env.ravelloh.durable_objects.bindings]]
name = "INGEST_DO"
class_name = "IngestDurableObject"

[[env.ravelloh.migrations]]
tag = "v1"
new_sqlite_classes = ["IngestDurableObject"]

[[env.ravelloh.d1_databases]]
binding = "DB"
database_name = "insightflare"
database_id = "391c1df6-dd3f-44f0-991c-63c7873b7d6a"
migrations_dir = "./migrations"

[[env.ravelloh.kv_namespaces]]
binding = "SITE_SETTINGS_KV"
id = "dbef57f92fc748e4929303ac5153045e"

[[env.ravelloh.r2_buckets]]
binding = "ARCHIVE_BUCKET"
bucket_name = "insightflare-archive"
preview_bucket_name = "insightflare-archive-preview"
